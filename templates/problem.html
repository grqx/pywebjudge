<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Problem P{{problem['id']}} - PWJ</title>
  <link rel="stylesheet" href="{{url_for('static', filename='index.css')}}">
  <script src="{{url_for('static', filename='problem.js')}}"></script>
  <script src="https://cdn.jsdelivr.net/pyodide/v0.29.3/full/pyodide.js"></script>
</head>
<body>
    <nav id="navbar">
        <ul>
            <li><a href="/">Home</a></li>
            <li><a href="/problems">Problems</a></li>
        </ul>
    </nav>

    <h2>P{{problem['id']}} - {{problem['title']}}</h2>
    <p>{{problem['desc'] or ''}}</p>

    <noscript><p>This page currently requires JavaScript and WebAssembly execution to function.</p></noscript>

    <div>
        <button id="run" disabled>Pyodide is still loading</button>
        <code id="user-code" class="code-area" contentEditable="plaintext-only" spellcheck="false"></code>
        <code id="output"></code>
    </div>

    <div>
        {% for testcase in testcases %}
        <h3>Testcase id {{testcase['test_no']}}</h3>
        <p>Sample Input</p>
        <code>{{testcase['in']}}</code>
        <p>Sample Output</p>
        <code>{{testcase['out']}}</code>
        {% endfor %}
    </div>
</body>
</html>
